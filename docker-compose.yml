version: '3.8'

# ==============================================================================
# Highlight Edit - Portainer Stack Deployment
# ==============================================================================
# This compose file uses the pre-built image from your registry.
# The unified image serves both frontend and backend on port 8000.
#
# Environment Variables (set in Portainer):
#   - SECRET_KEY: Your secure secret key
#   - BETA_INVITE_CODE: Beta access code (default: I-LOVE-NYAN-CAT)
# ==============================================================================

services:
  highlight-edit:
    image: registry.fukie.io/highlight_edit:latest
    ports:
      - "9191:8000"
    environment:
      - DATABASE_PATH=/data/sql_app.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - BETA_INVITE_CODE=${BETA_INVITE_CODE:-I-LOVE-NYAN-CAT}
      - ADOBE_CLIENT_ID=${ADOBE_CLIENT_ID}
      - ADOBE_CLIENT_SECRET=${ADOBE_CLIENT_SECRET}
    volumes:
      - /mnt/data/yk_highlight-edit/data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
